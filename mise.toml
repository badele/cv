###############################################################################
# Tools
###############################################################################
[settings]
lockfile = true
experimental=false

[tools]
act = "latest"
go = "latest"
just = "latest"
"go:github.com/badele/godown" = "latest"
"go:github.com/badele/justise" = "1.2.0"
gh = "latest"

###############################################################################
# Envs
###############################################################################
[env]
IMAGE_TAG = "badele/cv:latest"
OUT_DIR = "dist"
IMAGE_PLATFORMS = "linux/amd64,linux/arm64"
BIN_PLATFORMS = "darwin/amd64,darwin/arm64,linux/amd64,linux/arm64"
BUILDX_NAME = "multiarch"

BUILDX_CACHE_DIR = ".buildx-cache"

_.path = "dist/{{ os() | replace(from='macos', to='darwin') }}_{{ arch() | replace(from='x64', to='amd64') }}"

###############################################################################
# Task
###############################################################################
[tasks.justise]
description = "Convert mise to just recipe"
hide = true
silent = true
run = "justise"


[tasks.generate-pdf]
description = "Generate PDF from latex [cv]"
usage = '''
arg "<path>" help="latex filename" 
arg "[output]" help="output pdf path"
'''
run = '''
output_path="${usage_output}"
if [ -n "$output_path" ]; then
  output_dir=$(dirname "$output_path")
  output_name=$(basename "$output_path" .pdf)
  mkdir -p "$output_dir"
  pdflatex -output-directory "$output_dir" -jobname "$output_name" "${usage_path}/main.tex"
else
  pdflatex "${usage_path}/main.tex"
fi
'''
quiet = true

[tasks.update-github-stars]
description = "Update GitHub star counts [cv]"
run = '''
mise run install-python-deps
python3 scripts/update-github-stars.py
'''
usage = '''
flag "--force" default=#false
'''
quiet = true

[tasks.update-github-latex-content]
description = "Update GitHub stars in LaTeX [cv]"
run = '''
python3 scripts/update-github-latex-content.py
'''
quiet = true

[tasks.update-index-content]
description = "Update GitHub stars in web page [cv]"
run = '''
python3 scripts/update-index-content.py
'''
quiet = true

[tasks.update-github-assets]
description = "Update GitHub stars in cache and assets [cv]"
run = '''
mise run update-github-stars
mise run update-github-latex-content
mise run update-index-content
'''
quiet = true

[tasks.serve-content]
description = "Serve web pages [cv]"
run = '''
python3 -m http.server
'''

[tasks.install-python-deps]
description = "Install Python dependencies [python]"
run = "python3 -m pip install -r requirements.txt"
quiet = true

[tasks.generate-all-pdf]
description = "Generate all PDF from latex [cv]"
#depends = ["update-github-stars"]
run = '''
mise run generate-pdf "latex/fr" "cv-fr.pdf"
mise run generate-pdf "latex/en" "cv-en.pdf"
'''



[tasks.prepare-act-event]
description = "Prepare act event payload [ci]"
run = '''
mkdir -p .github/act
cat > .github/act/event.json <<'EOF'
{
  "act": true
}
EOF
'''
hide = true

[tasks.run-build-cv]
description = "Run build-cv workflow locally [ci]"
run = '''
mise run prepare-act-event
act -W .github/workflows/build-cv.yml -e .github/act/event.json
'''
